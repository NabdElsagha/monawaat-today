<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحدث المصري | تغطية إخبارية شاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5b;
            --gold: #c5a059;
            --bg: #f4f7f9;
            --text: #333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
        }

        /* هيدر احترافي */
        header {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        header p {
            margin: 10px 0 0;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        nav {
            background: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* حاوية الأخبار */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            border-right: 5px solid var(--gold);
            padding-right: 15px;
            margin-bottom: 30px;
            color: var(--primary);
            font-size: 1.8rem;
        }

        /* شكل الكارت المطور */
        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .news-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 1px solid #eee;
        }

        .news-card:hover { transform: translateY(-5px); }

        .card-img-wrapper {
            width: 100%;
            height: 400px;
            background: #e9ecef;
            position: relative;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 35px;
        }

        .tag {
            background: var(--gold);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .card-content h3 {
            font-size: 2rem;
            color: var(--primary);
            margin: 20px 0;
            line-height: 1.3;
        }

        .card-content p {
            line-height: 1.8;
            color: #555;
            font-size: 1.15rem;
            margin-bottom: 25px;
        }

        .btn-read {
            display: inline-block;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-read:hover { background: var(--gold); }

        footer {
            text-align: center;
            padding: 40px;
            background: #eee;
            margin-top: 50px;
            color: #777;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .card-img-wrapper { height: 250px; }
            .card-content h3 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>الحدث المصري</h1>
    <p>تغطية إخبارية شاملة تدار بتقنيات الذكاء الاصطناعي</p>
</header>

<nav>
    <a href="#">الرئيسية</a>
    <a href="#">أخبار مصر</a>
    <a href="#">تكنولوجيا</a>
    <a href="#">اقتصاد</a>
    <a href="#">رياضة</a>
</nav>

<div class="container">
    <h2 class="section-title">أحدث التطورات</h2>
    
    <div class="news-grid">
        </div>
</div>

<footer>
    <p>&copy; 2026 الحدث المصري - جميع الحقوق محفوظة</p>
</footer>

</body>
</html>
