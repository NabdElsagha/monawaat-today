<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENB - Egypt News Bureau</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #111; --white: #fff; --gold: #c5a059; --bg: #f9f9f9; --red: #e63946; --trend: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #333; padding-top: 140px; }
        
        header { 
            background: var(--black); color: var(--white); padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); position: fixed; width: 100%; top: 0; z-index: 3000;
        }
        .brand { font-family: 'Oswald', sans-serif; font-size: 2.2rem; color: var(--white); text-decoration: none; }
        .brand span { color: var(--gold); }

        /* شريط عاجل المطور */
        .breaking-bar { 
            background: var(--red); color: white; height: 40px; display: flex; 
            align-items: center; overflow: hidden; position: fixed; top: 72px; 
            width: 100%; z-index: 2500;
        }
        .breaking-label { background: #9b1c1c; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 10; position: absolute; right: 0; font-size: 0.85rem; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll-news 25s linear infinite; padding-right: 100%; font-weight: 700; }
        @keyframes scroll-news { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* القائمة العلوية */
        nav { display: flex; gap: 12px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a { text-decoration: none; color: rgba(255,255,255,0.8); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; padding: 5px 8px; border-radius: 3px; }
        nav a:hover, nav a.active-link { color: var(--gold); background: rgba(255,255,255,0.1); }
        .trend-link { color: var(--trend) !important; font-weight: 900; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .section-title { font-size: 1.4rem; text-transform: uppercase; font-weight: 900; color: var(--black); }

        #newsGrid { display: flex; flex-direction: column; gap: 20px; direction: rtl; min-height: 400px; }
        
        .article-card { background: var(--white); display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #eee; transition: 0.3s; }
        .article-card:hover { transform: translateY(-3px); }
        .card-img-wrap { width: 35%; min-width: 280px; height: 260px; background: #f0f0f0; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* علامة التريند */
        .badge { position: absolute; top: 10px; left: 10px; padding: 5px 12px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: white; }
        .badge-trend { background: var(--trend); }
        .badge-normal { background: var(--gold); color: black; }
        
        .card-body { padding: 25px; width: 65%; text-align: right; display: flex; flex-direction: column; justify-content: center; }
        .card-body h3 { font-size: 1.7rem; margin-bottom: 15px; color: var(--black); font-weight: 900; line-height: 1.2; }
        .card-body p { line-height: 1.8; color: #444; font-size: 1.05rem; }
        
        .full-article { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ddd; font-size: 1rem; color: #555; }
        .read-btn { background: var(--black); color: var(--white); padding: 12px 25px; border: none; cursor: pointer; margin-top: 20px; font-weight: 700; width: fit-content; align-self: flex-start; }

        footer { background: var(--black); color: var(--white); padding: 50px 20px; text-align: center; border-top: 4px solid var(--gold); margin-top: 60px; }

        @media (max-width: 768px) {
            .article-card { flex-direction: column; }
            .card-img-wrap { width: 100%; height: 220px; }
            .card-body { width: 100%; }
            body { padding-top: 160px; }
            .breaking-bar { top: 85px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="brand">ENB<span>.</span></a>
    <nav>
        <a href="#" class="trend-link" onclick="filterNews('Trending')">🔥 Trending</a>
        <a href="#" onclick="filterNews('all')">Latest</a>
        <a href="#" onclick="filterNews('World')">World</a>
        <a href="#" onclick="filterNews('Business')">Business</a>
        <a href="#" onclick="filterNews('Tech')">Tech</a>
        <a href="#" onclick="filterNews('Lifestyle')">Lifestyle</a>
        <a href="#" onclick="filterNews('Sport')">Sport</a>
    </nav>
</header>

<div class="breaking-bar">
    <div class="breaking-label">عاجل</div>
    <div class="ticker-move">ENB EXCLUSIVE: تقارير حصرية وتحليلات لأهم الأحداث العالمية والتريندات لحظة بلحظة...</div>
</div>

<div class="container">
    <div class="section-header">
        <h2 class="section-title" id="titleHeader">Latest News</h2>
    </div>
    <div id="newsGrid">
        </div>
</div>

<footer>
    <div class="brand" style="margin-bottom: 20px;">ENB<span>.</span></div>
    <p>© 2026 ENB - Egypt News Bureau. Quality Journalism Matters.</p>
</footer>

<script>
function toggleRead(btn) {
    const full = btn.previousElementSibling;
    if (full.style.display === "none" || full.style.display === "") {
        full.style.display = "block";
        btn.innerText = "عرض أقل";
    } else {
        full.style.display = "none";
        btn.innerText = "Read More / إقرأ المزيد";
    }
}

function filterNews(cat) {
    const cards = document.querySelectorAll('.article-card');
    const header = document.getElementById('titleHeader');
    header.innerText = cat === 'all' ? 'Latest News' : cat + " Updates";
    
    cards.forEach(card => {
        if (cat === 'all' || card.getAttribute('data-category') === cat) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}

// كود بديل للصور المعطلة لضمان القبول في AdSense
setInterval(() => {
    document.querySelectorAll('.card-img').forEach(img => {
        if (!img.complete || img.naturalWidth === 0) {
            img.src = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=800&q=80";
        }
    });
}, 3000);
</script>
</body>
</html>
