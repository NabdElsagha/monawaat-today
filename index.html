<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحدث المصري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #001f3f; --gold: #c5a059; --bg: #f4f7f9; --red: #e63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #1a1a1a; }
        
        /* الهيدر المظبوط */
        header { background: var(--primary); color: white; padding: 45px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .logo-container { 
            width: 95px; height: 95px; background: var(--gold); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* رسم حرف الحاء الكوفي المربع الصريح */
        .logo-container svg { width: 65px; height: 65px; fill: var(--primary); }

        header h1 { font-family: 'Amiri', serif; font-size: 3rem; margin: 0; line-height: 1; }
        header p { font-size: 1.1rem; color: var(--gold); margin-top: 10px; font-weight: bold; }

        /* شريط عاجل الإخباري */
        .breaking-strip { background: var(--red); color: white; height: 45px; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 2px solid var(--gold); }
        .label { background: #9b1c1c; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 10; position: absolute; right: 0; }
        .scroller { display: inline-block; white-space: nowrap; animation: move 25s linear infinite; padding-right: 120px; font-weight: bold; }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        nav { background: white; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-links { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; padding: 12px; gap: 25px; }
        nav a { text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1rem; }

        .content { max-width: 750px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 40px; border: 1px solid #eee; }
        .card-img { width: 100%; height: 300px; object-fit: cover; }
        .card-body { padding: 25px; text-align: right; }
        .card-body h3 { font-size: 2rem; color: var(--primary); margin-bottom: 15px; font-family: 'Amiri', serif; }
        .card-body p { line-height: 1.8; color: #444; }
        
        .read-more-content { display: none; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
        .btn { display: block; width: 100%; background: var(--primary); color: white !important; text-align: center; padding: 15px; border-radius: 8px; border: none; margin-top: 20px; font-weight: 900; cursor: pointer; }

        footer { background: #001226; color: white; padding: 40px; text-align: center; border-top: 5px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg viewBox="0 0 100 100">
            <path d="M20 20h60v15H35v15h45v30H20v-15h45V65H20V20z"/>
        </svg>
    </div>
    <h1>الحدث المصري</h1>
    <p>نبض مصر بين يديك</p>
</header>

<div class="breaking-strip">
    <div class="label">عاجل</div>
    <div class="scroller" id="tickerContent">الحدث المصري يتابع أهم الأنباء والتقارير العالمية على مدار الساعة...</div>
</div>

<nav>
    <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="#">عالمي</a>
        <a href="#">اقتصاد</a>
        <a href="#">رياضة</a>
    </div>
</nav>

<div class="content">
    <div id="newsGrid"></div>
</div>

<footer><p>© 2026 الحدث المصري - جميع الحقوق محفوظة</p></footer>

<script>
function togglePost(btn) {
    const details = btn.previousElementSibling;
    if (details.style.display === "none" || details.style.display === "") {
        details.style.display = "block";
        btn.innerText = "عرض أقل";
    } else {
        details.style.display = "none";
        btn.innerText = "إقرأ المزيد";
    }
}
</script>
</body>
</html>
