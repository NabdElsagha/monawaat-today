<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENB - Egypt News Bureau</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --black: #111; --white: #fff; --gold: #c5a059; --bg: #f9f9f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
        
        header { 
            background: var(--black); color: var(--white); padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); position: fixed; width: 100%; top: 0; z-index: 2000;
        }
        
        .brand { font-family: 'Oswald', sans-serif; font-size: 2.5rem; letter-spacing: -1px; color: var(--white); text-decoration: none; }
        .brand span { color: var(--gold); }

        nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-end; }
        nav a { 
            text-decoration: none; color: rgba(255,255,255,0.7); 
            font-weight: 700; text-transform: uppercase; font-size: 0.85rem;
            letter-spacing: 0.5px; transition: 0.3s; padding: 5px 10px;
        }
        nav a:hover { color: var(--gold); }

        .container { max-width: 1000px; margin: 120px auto 50px auto; padding: 0 20px; }
        .grid-title { font-size: 1.4rem; color: var(--black); text-transform: uppercase; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .grid-title::after { content: ''; flex-grow: 1; height: 1px; background: #ccc; }

        #newsGrid { direction: rtl; display: flex; flex-direction: column; gap: 30px; }
        
        .article-card { 
            background: var(--white); display: flex; flex-direction: row; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; border: 1px solid #eee;
        }
        
        .card-img-wrap { width: 35%; min-width: 250px; position: relative; height: 250px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .category-badge { position: absolute; top: 10px; left: 10px; background: var(--gold); color: var(--black); padding: 4px 10px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .card-body { padding: 25px; width: 65%; display: flex; flex-direction: column; justify-content: center; }
        .card-body h3 { font-size: 1.8rem; color: var(--black); margin-bottom: 12px; font-weight: 900; line-height: 1.2; }
        .card-body p { line-height: 1.7; color: #444; font-size: 1.05rem; }
        
        .full-article { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .read-btn { 
            background: var(--black); color: var(--white); text-align: center; padding: 12px; 
            margin-top: 15px; font-weight: 700; cursor: pointer; border: none; font-size: 0.9rem; width: fit-content; align-self: flex-start;
        }

        footer { background: var(--black); color: var(--white); padding: 40px; text-align: center; border-top: 5px solid var(--gold); }
        
        @media (max-width: 768px) {
            .article-card { flex-direction: column; }
            .card-img-wrap { width: 100%; height: 200px; }
            .card-body { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="brand">ENB<span>.</span></a>
    <nav id="mainNav">
        <a href="#" onclick="filterNews('all')">Latest</a>
        <a href="#" onclick="filterNews('World')">World</a>
        <a href="#" onclick="filterNews('Business')">Business</a>
        <a href="#" onclick="filterNews('Tech')">Tech</a>
        <a href="#" onclick="filterNews('Sport')">Sport</a>
    </nav>
</header>

<div class="container">
    <h2 class="grid-title" id="sectionTitle">Latest Updates</h2>
    <div id="newsGrid">
        </div>
</div>

<footer>
    <p>© 2026 ENB - Egypt News Bureau</p>
</footer>

<script>
function toggleRead(btn) {
    const fullText = btn.previousElementSibling;
    if (fullText.style.display === "none" || fullText.style.display === "") {
        fullText.style.display = "block";
        btn.innerText = "Show Less / عرض أقل";
    } else {
        fullText.style.display = "none";
        btn.innerText = "Read More / إقرأ المزيد";
    }
}

function filterNews(cat) {
    const cards = document.querySelectorAll('.article-card');
    const title = document.getElementById('sectionTitle');
    title.innerText = cat === 'all' ? 'Latest Updates' : cat + ' News';
    
    cards.forEach(card => {
        if (cat === 'all' || card.getAttribute('data-category') === cat) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>
</body>
</html>
