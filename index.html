<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع منوعات تريند - نبض الصاغة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .article-link { display: block; background: #ecf0f1; margin: 10px 0; padding: 15px; border-radius: 5px; text-decoration: none; color: #2980b9; font-weight: bold; transition: 0.3s; }
        .article-link:hover { background: #3498db; color: white; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <h1>أحدث المقالات والتريندات</h1>
        <div id="article-list">
            <p style="text-align:center;">جاري تحميل أحدث المقالات...</p>
        </div>
    </div>

    <script>
        // كود بسيط لجلب المقالات (بما أننا على GitHub Pages)
        // ملاحظة: ستحتاج لتحديث الروابط يدويا أو جعل السكريبت يقرأ المجلد
        // كبداية، المقال الذي ظهر لك في مجلد articles، انسخ اسمه وضعه هنا للتجربة
        const articles = [
            "articles/post-xxxxxxx.html" // استبدل xxxxx بالرقم اللي ظهر في مجلد articles
        ];
        
        const listDiv = document.getElementById('article-list');
        listDiv.innerHTML = ''; 
        articles.forEach(art => {
            const link = document.createElement('a');
            link.href = art;
            link.className = 'article-link';
            link.innerText = "شاهد المقال: " + art.replace('articles/', '');
            listDiv.appendChild(link);
        });
    </script>
</body>
</html>
