<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض الصاغة | بوابة المحتوى الذكي</title>
    <style>
        :root { --primary: #1a237e; --accent: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: var(--bg); margin: 0; color: #333; }
        header { background: linear-gradient(135deg, var(--primary), #0d47a1); color: white; padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-bar { background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-bar a { margin: 0 15px; text-decoration: none; color: var(--primary); font-weight: bold; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-header { border-right: 6px solid var(--accent); padding-right: 15px; margin: 40px 0 20px; color: var(--primary); font-size: 1.5em; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card-content { padding: 20px; }
        .card-category { color: var(--accent); font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .card h3 { margin: 10px 0; color: var(--primary); font-size: 1.2em; line-height: 1.4; }
        .card p { color: #666; font-size: 0.9em; line-height: 1.6; }
        .read-more { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 0 0 12px 12px; transition: 0.3s; }
        .read-more:hover { background: var(--accent); }
        .empty-state { text-align: center; padding: 50px; color: #999; border: 2px dashed #ccc; border-radius: 15px; }
    </style>
</head>
<body>

<header>
    <h1>بوابة نبض الصاغة</h1>
    <p>تغطية إخبارية شاملة تدار بالذكاء الاصطناعي</p>
</header>

<div class="nav-bar">
    <a href="#">الرئيسية</a>
    <a href="#">أخبار مصر</a>
    <a href="#">تكنولوجيا</a>
    <a href="#">رياضة</a>
    <a href="#">اقتصاد</a>
</div>

<div class="container">
    <div class="section-header">🔴 أحدث المقالات والتريند</div>
    
    <div class="news-grid" id="articles-container">
        <div class="card">
            <div class="card-content">
                <span class="card-category">أخبار</span>
                <h3>جاري توليد المقالات الجديدة...</h3>
                <p>انتظر قليلاً، يقوم البوت حالياً بصياغة أحدث التقارير الإخبارية من أجلك.</p>
            </div>
            <a href="#" class="read-more">قريباً</a>
        </div>
    </div>
</div>

<script>
    // كود بسيط لجلب المقالات تلقائياً لو أردت مستقبلاً
    console.log("بوابة نبض الصاغة جاهزة.");
</script>

</body>
</html>
