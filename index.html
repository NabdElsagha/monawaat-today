<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحدث المصري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #001f3f; --gold: #c5a059; --bg: #f4f7f9; --red: #e63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #1a1a1a; }
        
        /* الهيدر باللوجو الكوفي المربع (بدون نقطة) */
        header { background: var(--primary); color: white; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box { 
            width: 85px; height: 85px; background: var(--gold); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #fff;
        }
        /* رسم حرف الحاء الكوفي الهندسي */
        .logo-box svg { width: 55px; height: 55px; fill: var(--primary); }
        
        header h1 { font-family: 'Amiri', serif; font-size: 2.8rem; margin: 0; line-height: 1; }
        header p { font-size: 1.1rem; color: var(--gold); margin-top: 10px; font-weight: bold; }

        /* شريط الأخبار العاجلة الأحمر */
        .breaking-news { background: var(--red); color: white; height: 45px; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 3px solid var(--gold); border-bottom: 1px solid #fff; }
        .breaking-label { background: #b91c1c; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 5; position: absolute; right: 0; box-shadow: 5px 0 10px rgba(0,0,0,0.2); }
        .breaking-text { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; padding-right: 100%; font-weight: bold; font-size: 1.1rem; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        nav { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); border-bottom: 2px solid var(--gold); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; padding: 12px; gap: 20px; }
        nav a { text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1rem; }

        .container { max-width: 750px; margin: 35px auto; padding: 0 15px; }
        .news-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 40px; border: 1px solid #eee; }
        .card-img { width: 100%; height: 350px; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 30px; text-align: right; }
        .card-body h3 { font-size: 2.2rem; color: var(--primary); margin-bottom: 20px; font-family: 'Amiri', serif; line-height: 1.3; }
        .more-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .btn-read-more { display: block; width: 100%; background: var(--primary); color: white !important; text-align: center; padding: 15px; border-radius: 10px; border: none; margin-top: 25px; font-weight: 900; cursor: pointer; }

        footer { background: #001226; color: white; padding: 40px; text-align: center; border-top: 6px solid var(--gold); margin-top: 60px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <svg viewBox="0 0 100 100">
            <path d="M25 25h50v10H35v15h40v25H25v-10h40V60H25V25z"/>
        </svg>
    </div>
    <h1>الحدث المصري</h1>
    <p>نبض مصر بين يديك</p>
</header>

<div class="breaking-news">
    <div class="breaking-label">عاجل</div>
    <div class="breaking-text" id="breakingTicker">نتابع أهم التريندات العالمية والتقارير الحصرية...</div>
</div>

<nav>
    <div class="nav-container">
        <a href="index.html">الرئيسية</a>
        <a href="#">أخبار عالمية</a>
        <a href="#">اقتصاد</a>
        <a href="#">تكنولوجيا</a>
        <a href="#">رياضة</a>
    </div>
</nav>

<div class="container">
    <div id="newsGrid"></div>
</div>

<footer><p>© 2026 الحدث المصري - جميع الحقوق محفوظة</p></footer>

<script>
function toggleContent(btn) {
    const content = btn.previousElementSibling;
    if (content.style.display === "none" || content.style.display === "") {
        content.style.display = "block";
        btn.innerText = "عرض أقل";
    } else {
        content.style.display = "none";
        btn.innerText = "إقرأ المزيد";
    }
}
</script>
</body>
</html>
