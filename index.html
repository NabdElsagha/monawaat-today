<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحدث المصري | بوابة الأخبار الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002347; --gold: #b08d57; --bg: #fdfdfd; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: #222; overflow-x: hidden; }
        
        /* هيدر احترافي مع لوجو على اليمين */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 25px 5%; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            border-bottom: 4px solid var(--gold);
            gap: 25px;
        }

        .logo-container {
            width: 85px;
            height: 85px;
            background: var(--gold);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .header-text { text-align: right; }
        header h1 { font-family: 'Amiri', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); margin: 0; line-height: 1.1; }
        header p { font-size: 1.1rem; opacity: 0.8; margin: 8px 0 0 0; }

        /* ناف بار الأقسام */
        nav { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; overflow-x: auto; padding: 10px 0; }
        nav a { padding: 10px 18px; text-decoration: none; color: var(--primary); font-weight: 700; font-size: 1rem; border-radius: 20px; margin: 0 5px; white-space: nowrap; }
        nav a:hover, nav a.active { background: var(--primary); color: var(--gold); }

        .container { max-width: 850px; margin: 50px auto; padding: 0 20px; }
        .section-header { position: relative; margin-bottom: 40px; padding-right: 20px; border-right: 6px solid var(--gold); }
        .section-header h2 { font-size: 2.2rem; color: var(--primary); margin: 0; font-family: 'Amiri', serif; }

        .news-grid { display: flex; flex-direction: column; gap: 45px; }
        .news-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .card-img-wrapper { width: 100%; height: 400px; position: relative; overflow: hidden; background: #eee; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .category-badge { position: absolute; top: 20px; right: 20px; background: var(--gold); color: white; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 0.9rem; z-index: 10; }

        .card-content { padding: 35px; text-align: right; }
        .card-content h3 { font-size: 2.1rem; color: var(--primary); margin: 0 0 20px 0; line-height: 1.3; font-family: 'Amiri', serif; }
        .card-content p { font-size: 1.2rem; color: #555; line-height: 1.8; margin-bottom: 25px; }
        
        .btn-read { display: inline-block; padding: 12px 30px; background: transparent; color: var(--primary); text-decoration: none; border: 2px solid var(--primary); border-radius: 5px; font-weight: 700; cursor: pointer; }

        footer { background: #001226; color: white; padding: 50px 20px; text-align: center; margin-top: 80px; border-top: 5px solid var(--gold); }
        .footer-logo { font-family: 'Amiri', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 10px; display: block; }

        @media (max-width: 600px) {
            header { padding: 20px; gap: 15px; }
            .logo-container { width: 65px; height: 65px; }
            .card-img-wrapper { height: 250px; }
            .card-content h3 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<header>
    <div class="logo-container">
        <img src="https://via.placeholder.com/150/b08d57/ffffff?text=الحدث" alt="لوجو">
    </div>
    <div class="header-text">
        <h1>الحدث المصري</h1>
        <p>نبض الواقع بصياغة احترافية</p>
    </div>
</header>
<nav>
    <div class="nav-container">
        <a href="index.html" class="active">الرئيسية</a>
        <a href="#">سياسة دولية</a>
        <a href="#">اقتصاد</a>
        <a href="#">حوادث عامة</a>
        <a href="#">تكنولوجيا</a>
        <a href="#">رياضة</a>
        <a href="#">منوعات</a>
    </div>
</nav>
<div class="container">
    <div class="section-header">
        <h2>أحدث التقارير الحصرية</h2>
    </div>
    <div class="news-grid" id="newsGrid">
        </div>
</div>
<footer>
    <span class="footer-logo">الحدث المصري</span>
    <p>© 2026 جميع الحقوق محفوظة لمؤسسة الحدث المصري</p>
</footer>
</body>
</html>
