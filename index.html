<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحدث المصري | نبض مصر بين يديك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #001f3f; --gold: #c5a059; --bg: #f4f7f9; --red: #e63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #1a1a1a; }
        
        /* الهيدر باللوجو المعتمد (المربع الذهبي بحرف ح كوفي) */
        header { background: var(--primary); color: white; padding: 45px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box { 
            width: 90px; height: 90px; background: var(--gold); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 2px solid #fff; position: relative;
        }
        /* رسم حرف الحاء الكوفي الهندسي من التصميم اللي اخترته */
        .logo-box svg { width: 65px; height: 65px; fill: var(--primary); }
        
        header h1 { font-family: 'Amiri', serif; font-size: 3rem; margin: 0; line-height: 1; }
        header p { font-size: 1.2rem; color: var(--gold); margin-top: 10px; font-weight: bold; }

        /* شريط الأخبار العاجلة الأحمر */
        .breaking-news-bar { background: var(--red); color: white; height: 45px; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 3px solid var(--gold); border-bottom: 2px solid #fff; }
        .breaking-tag { background: #b91c1c; padding: 0 25px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 10; position: absolute; right: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.3); font-size: 1.1rem; }
        .breaking-ticker { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; padding-right: 150px; font-weight: 800; font-size: 1.1rem; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        nav { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); border-bottom: 2px solid var(--gold); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; padding: 12px; gap: 25px; overflow-x: auto; }
        nav a { text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1rem; white-space: nowrap; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        .container { max-width: 750px; margin: 40px auto; padding: 0 15px; }
        .section-title { font-size: 2.2rem; color: var(--primary); border-right: 6px solid var(--gold); padding-right: 15px; margin-bottom: 30px; font-family: 'Amiri', serif; text-align: right; }

        .news-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.07); margin-bottom: 45px; border: 1px solid #eee; }
        .card-img-container { width: 100%; height: 380px; position: relative; }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 35px; text-align: right; }
        .card-body h3 { font-size: 2.3rem; color: var(--primary); margin-bottom: 20px; font-family: 'Amiri', serif; line-height: 1.3; }
        .card-body p { color: #333; font-size: 1.1rem; line-height: 1.9; }
        
        .hidden-details { display: none; margin-top: 25px; padding-top: 25px; border-top: 1px dashed #ccc; color: #444; }
        .read-more-btn { display: block; width: 100%; background: var(--primary); color: white !important; text-align: center; padding: 16px; border-radius: 12px; border: none; margin-top: 25px; font-weight: 900; cursor: pointer; font-size: 1.1rem; }

        footer { background: #001226; color: white; padding: 45px; text-align: center; border-top: 6px solid var(--gold); margin-top: 70px; }
        footer p { opacity: 0.8; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <svg viewBox="0 0 100 100">
            <rect x="25" y="15" width="10" height="10" />
            <rect x="40" y="15" width="10" height="10" />
            <rect x="25" y="30" width="10" height="10" />
            <rect x="40" y="30" width="10" height="10" />
            <path d="M25 45h50v10H35v15h40v15H25v-10h40V70H25V45z"/>
        </svg>
    </div>
    <h1>الحدث المصري</h1>
    <p>نبض مصر بين يديك</p>
</header>

<div class="breaking-news-bar">
    <div class="breaking-tag">عاجل</div>
    <div class="breaking-ticker" id="tickerContent">الحدث المصري يتابع أهم التريندات والتقارير الحصرية لحظة بلحظة...</div>
</div>

<nav>
    <div class="nav-container">
        <a href="index.html">الرئيسية</a>
        <a href="#">عالمي</a>
        <a href="#">اقتصاد</a>
        <a href="#">تقنية</a>
        <a href="#">رياضة</a>
    </div>
</nav>

<div class="container">
    <h2 class="section-title">أحدث التقارير والتريندات</h2>
    <div id="newsGrid"></div>
</div>

<footer><p>© 2026 الحدث المصري - جميع الحقوق محفوظة</p></footer>

<script>
function togglePost(btn) {
    const details = btn.previousElementSibling;
    if (details.style.display === "none" || details.style.display === "") {
        details.style.display = "block";
        btn.innerText = "عرض أقل";
    } else {
        details.style.display = "none";
        btn.innerText = "إقرأ المزيد";
    }
}
</script>
</body>
</html>
