name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # السطر ده بيضمن إننا بننزل أحدث نسخة من مكتبة جوجل عشان نتفادى خطأ 404
        run: npm install @google/generative-ai

      - name: Run Auto Writer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node auto-writer.js

      - name: Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add articles/
          git commit -m "إضافة مقال جديد" || exit 0
          git push
