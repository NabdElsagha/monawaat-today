name: Auto Post
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node auto-writer.js
      - name: Push
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          git add articles/
          git commit -m "new article" || exit 0
          git push
