name: Auto Post
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - name: Generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node auto-writer.js
      - name: Push
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          git add articles/
          git commit -m "new post" || exit 0
          git push
