name: Auto Article Post
on:
  schedule:
    - cron: '0 12 * * *' # هيشتغل لوحده كل يوم الساعة 12 ظهراً
  workflow_dispatch: # زرار يسمح لك تشغله يدوياً في أي وقت للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @google/generative-ai

      - name: Generate Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node auto-writer.js

            - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # هنا بنقول له ضيف مجلد المقالات والملفات الأساسية بس
          git add articles/ index.html
          git commit -m "نشر مقال جديد تلقائياً" || exit 0
          git push
